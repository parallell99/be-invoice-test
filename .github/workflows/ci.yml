# ใช้เมื่อ repo นี้เป็น backend อย่างเดียว (ราก = โฟลเดอร์ BE เดิม)
# GitHub อ่านเฉพาะ .github ที่รากของ repository — หลังแยก repo ให้โคลน/copy โฟลเดอร์ BE เป็น repo ใหม่แล้ว .github จะอยู่ราก

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Syntax check (Node parse)
        run: |
          set -e
          find src scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | while IFS= read -r -d '' f; do
            echo "check $f"
            node --check "$f"
          done
